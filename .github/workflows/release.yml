name: Release

on:
  push:
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  release:
    name: Build, Push & Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | grep -v "${{ steps.version.outputs.VERSION }}" | head -1)
          if [ -z "$PREV_TAG" ]; then
            COMMITS=$(git log --pretty=format:"- %s" | head -20)
          else
            COMMITS=$(git log ${PREV_TAG}..${{ steps.version.outputs.VERSION }} --pretty=format:"- %s")
          fi
          echo "COMMITS<<EOF" >> $GITHUB_OUTPUT
          echo "$COMMITS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: actions/github-script@v7
        with:
          script: |
            const version = '${{ steps.version.outputs.VERSION }}';
            const image = '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}';
            const commits = `${{ steps.changelog.outputs.COMMITS }}`;

            const composeSnippet = [
              'services:',
              '  listbridge:',
              '    image: ' + image + ':' + version,
              '    container_name: listbridge',
              '    restart: unless-stopped',
              '    ports:',
              '      - "${PORT:-5000}:5000"',
              '    volumes:',
              '      - /path/to/your/music:/music',
              '      - listbridge_data:/app/data',
              '    environment:',
              '      - SECRET_KEY=${SECRET_KEY:?SECRET_KEY is required}',
              '      - PLEX_URL',
              '      - PLEX_TOKEN',
              '      - PLEX_MUSIC_LIBRARY',
              '      - NAVIDROME_URL',
              '      - NAVIDROME_USER',
              '      - NAVIDROME_PASSWORD',
              '      - M3U_DIRECTORY=/music',
              '      - PLEX_POLL_INTERVAL=60',
              '      - PORT=5000',
              '      - PLEX_PATH_PREFIX',
              '      - LOCAL_PATH_PREFIX',
              'volumes:',
              '  listbridge_data:',
            ].join('\n');

            const envSnippet = [
              'SECRET_KEY=change-me-to-something-random',
              'PLEX_URL=http://<your-plex-ip>:32400',
              'PLEX_TOKEN=<your-plex-token>',
              'PLEX_MUSIC_LIBRARY=Music',
              'NAVIDROME_URL=http://<your-navidrome-ip>:4533',
              'NAVIDROME_USER=admin',
              'NAVIDROME_PASSWORD=<your-navidrome-password>',
              '# Path prefix Plex uses internally (e.g. /data/Music)',
              'PLEX_PATH_PREFIX=/data/Music',
              '# Path prefix visible inside the ListBridge container (e.g. /music)',
              'LOCAL_PATH_PREFIX=/music',
            ].join('\n');

            const body = [
              '## ListBridge ' + version,
              '',
              '### Changes',
              commits,
              '',
              '---',
              '',
              '### 🚀 Deploy',
              '',
              '**1. Create a `.env` file:**',
              '```env',
              envSnippet,
              '```',
              '',
              '**2. Create a `docker-compose.yml` and run `docker compose up -d`:**',
              '```yaml',
              composeSnippet,
              '```',
              '',
              '---',
              '',
              '### 🔄 Update an existing install',
              '```bash',
              'docker compose pull && docker compose up -d',
              '```',
              '',
              '---',
              '',
              '### 📖 Documentation',
              'See the [README](https://github.com/${{ github.repository }}#readme) for full setup and configuration details.',
            ].join('\n');

            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: version,
              name: 'ListBridge ' + version,
              body: body,
              draft: false,
              prerelease: version.includes('-'),
            });

            console.log('Release created: ListBridge ' + version);
